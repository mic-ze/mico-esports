<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぜのん | MICO e-Sports</title>
  <style>
    /* 共通スタイル */
    :root { --bg-main: #0a0c10; --bg-card: #161b22; --text-main: #e6edf3; --text-muted: #8b949e; --accent-blue: #2f81f7; --accent-cyan: #00d4ff; --border-color: #30363d; --radius: 18px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: #0a0c10; color: var(--text-main); line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 32px, 1100px); margin: 0 auto; }
    
    #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0a0c10; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.6s ease, visibility 0.6s ease; }
    .loader-logo { font-size: 2rem; font-weight: 800; letter-spacing: 2px; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 0.6; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.6; transform: scale(0.98); } }
    .loader-hidden { opacity: 0; visibility: hidden; }

    header { position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(16px); background: rgba(10,12,16,0.85); border-bottom: 1px solid rgba(48,54,61,0.7); }
    .nav { display: flex; justify-content: space-between; align-items: center; min-height: 72px; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.2rem; letter-spacing: 0.5px; }
    .logo img { width: 38px; height: 38px; object-fit: contain; }
    .logo span { background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .nav-links a { font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; transition: all 0.3s ease; }
    .nav-links a:hover { color: #ffffff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }

    /* ===== Member Hero Section (上部の大きな名前と画像) ===== */
    .member-hero {
      padding: 80px 0;
      background: radial-gradient(circle at right, rgba(47,129,247,0.15), transparent 50%), linear-gradient(rgba(10, 12, 16, 0.5), rgba(10, 12, 16, 1));
      border-bottom: 1px solid var(--border-color);
    }
    .member-hero-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 40px;
    }
    .member-info-top .game-title { color: var(--accent-blue); font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .member-info-top h1 { font-size: 4.5rem; line-height: 1.1; margin: 0; letter-spacing: 2px; }
    
    /* 立ち絵や大きなアイコンを表示するエリア */
    .member-hero-image img {
      width: 250px;
      height: 250px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 0 30px rgba(47, 129, 247, 0.2);
    }

    /* ===== Profile Section (下部の詳細データ) ===== */
    .profile-section { padding: 60px 0 100px; }
    .profile-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 40px; letter-spacing: 1px; }
    
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* 左(文章)と右(表)に分ける */
      gap: 60px;
    }
    .profile-desc p { font-size: 1.05rem; line-height: 1.8; margin-bottom: 30px; }
    
    /* SNSボタン */
    .sns-links { display: flex; gap: 16px; flex-wrap: wrap; }
    .btn { padding: 12px 24px; border-radius: 999px; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; transition: all 0.2s ease; display: inline-block; }
    .primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); color: #fff; border: none; }
    .primary:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

    /* プロフィールデータ（表） */
    .profile-data dl {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 20px 10px;
      border-top: 2px solid var(--border-color);
      padding-top: 24px;
    }
    .profile-data dt { font-weight: bold; color: var(--text-muted); }
    .profile-data dd { color: var(--text-main); font-weight: 600; margin: 0; }

    footer { border-top: 1px solid var(--border-color); padding: 40px 0; text-align: center; }
    .muted { color: var(--text-muted); }

    /* スマホ対応 */
    @media (max-width: 800px) {
      .member-hero-inner { flex-direction: column; text-align: center; justify-content: center; }
      .member-info-top h1 { font-size: 3rem; }
      .profile-grid { grid-template-columns: 1fr; gap: 40px; }
      .nav-links { justify-content: center; gap: 12px; margin-top: 10px; }
    }
  </style>
</head>
<body>
<div id="loader"><div class="loader-logo">MICO e-Sports</div></div>

<header>
  <div class="container nav">
    <div class="logo">
      <a href="index.html" style="display:flex; align-items:center; gap:12px;">
        <img src="logo.png" alt="MICOロゴ"><span>MICO e-Sports</span>
      </a>
    </div>
    <nav class="nav-links">
      <a href="news.html">NEWS</a>
      <a href="about.html">ABOUT</a>
      <a href="divisions.html">DIVISIONS</a>
      <a href="members.html" style="color: #fff;">MEMBERS</a>
      <a href="sponsor.html">SPONSOR</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="member-hero">
    <div class="container member-hero-inner">
      <div class="member-info-top">
        <span class="game-title">Fortnite / Owner</span>
        <h1>ぜのん</h1>
      </div>
      <div class="member-hero-image">
        <img src="member-zenon.png" alt="ぜのん">
      </div>
    </div>
  </section>

  <section class="profile-section">
    <div class="container">
      <h2 class="profile-title">PROFILE</h2>
      
      <div class="profile-grid">
        <div class="profile-desc">
          <p>
            MICO e-Sportsのオーナー。<br>
            チームの最前線に立ちながら、ゲームの楽しさと競技の厳しさを体現する。<br>
            常に新しい挑戦を続け、ファンと共に成長していくことを目指している。
          </p>
          <div class="sns-links">
            <!-- リンク先を javascript:void(0) にし、別タブで開く target="_blank" を削除しました -->
            <a href="javascript:void(0)" class="btn primary">X</a>
            <a href="javascript:void(0)" class="btn primary" style="background: #ff0000;">YouTube</a>
          </div>
        </div>

        <div class="profile-data">
          <dl>
            <dt>誕生日</dt><dd>10月6日</dd>
            <dt>趣味</dt><dd>野球観戦</dd>
            <dt>特技</dt><dd>計算</dd>
            <dt>好きなもの</dt><dd>アイス</dd>
            <dt>AIMの秘訣</dt><dd>落ち着くこと</dd>
          </dl>
        </div>
      </div>
    </div>
  </section>
</main>

<footer><div class="container"><p class="muted" style="font-size: 0.85rem;">&copy; 2026 MICO e-Sports. All rights reserved.</p></div></footer>
<script>window.addEventListener('load', function() { setTimeout(function() { document.getElementById('loader').classList.add('loader-hidden'); }, 400); });</script>
</body>
</html>
