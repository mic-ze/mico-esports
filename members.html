<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEMBERS | MICO e-Sports</title>
  <style>
    /* トップページと同じ共通スタイル */
    :root {
      --bg-main: #0a0c10; --bg-card: #161b22; --text-main: #e6edf3;
      --text-muted: #8b949e; --accent-blue: #2f81f7; --accent-cyan: #00d4ff;
      --border-color: #30363d; --radius: 18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: #0a0c10; color: var(--text-main); line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 32px, 1100px); margin: 0 auto; }

    /* ===== Loading Screen ===== */
    #loader {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #0a0c10; z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .loader-logo {
      font-size: 2rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { opacity: 0.6; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.6; transform: scale(0.98); } }
    .loader-hidden { opacity: 0; visibility: hidden; }

    /* ===== Header ===== */
    header {
      position: sticky; top: 0; z-index: 1000;
      backdrop-filter: blur(16px); background: rgba(10,12,16,0.85);
      border-bottom: 1px solid rgba(48,54,61,0.7);
    }
    .nav { display: flex; justify-content: space-between; align-items: center; min-height: 72px; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.2rem; letter-spacing: 0.5px; }
    .logo img { width: 38px; height: 38px; object-fit: contain; }
    .logo span { background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .nav-links a { font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; transition: all 0.3s ease; }
    .nav-links a:hover { color: #ffffff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }

    /* ===== Page Title ===== */
    .page-header { padding: 100px 0 60px; text-align: center; background: linear-gradient(rgba(10, 12, 16, 0.8), rgba(10, 12, 16, 1)); }
    .page-title { font-size: 2.5rem; font-weight: bold; letter-spacing: 2px; }
    .page-subtitle { color: var(--accent-blue); font-size: 1rem; font-weight: bold; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }

    /* ===== Members Content ===== */
    section { padding: 40px 0 80px; }
    .flex-center { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; }
    .card { background: rgba(22,27,34,0.9); border: 1px solid var(--border-color); border-left: 4px solid var(--border-color); border-radius: var(--radius); padding: 30px 24px; transition: all 0.3s ease; }
    .card:hover { border-color: var(--accent-blue); border-left-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(47, 129, 247, 0.2); transform: translateY(-4px); }
    .member { display: flex; gap: 16px; align-items: center; position: relative; width: 100%; max-width: 350px; }
    .member::after { content: "→"; position: absolute; right: 20px; color: var(--text-muted); font-size: 1.2rem; font-weight: bold; transition: all 0.3s ease; }
    .member:hover::after { color: var(--accent-cyan); transform: translateX(4px); }
    .avatar-img { width: 50px; height: 50px; border-radius: 14px; object-fit: cover; }
    .muted { color: var(--text-muted); }

    footer { border-top: 1px solid var(--border-color); padding: 40px 0; text-align: center; }

    @media (max-width: 800px) {
      .nav-links { justify-content: center; gap: 12px; margin-top: 10px; }
      .page-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div id="loader"><div class="loader-logo">MICO e-Sports</div></div>

<header>
  <div class="container nav">
    <div class="logo">
      <a href="index.html" style="display:flex; align-items:center; gap:12px;">
        <img src="logo.png" alt="MICOロゴ">
        <span>MICO e-Sports</span>
      </a>
    </div>
    <nav class="nav-links">
      <a href="news.html">NEWS</a>
      <a href="about.html">ABOUT</a>
      <a href="divisions.html">DIVISIONS</a>
      <a href="members.html">MEMBERS</a>
      <a href="sponsor.html">SPONSOR</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-subtitle">MEMBERS</div>
    <h1 class="page-title">メンバー</h1>
  </div>

  <section>
    <div class="container">
      <div class="flex-center">
        <div class="card member">
          <img src="image.png" alt="kurosiro" class="avatar-img">
          <div>
            <b>kurosiro</b>
            <p class="muted">Fortnite</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="container">
    <p class="muted" style="font-size: 0.85rem;">&copy; 2026 MICO e-Sports. All rights reserved.</p>
  </div>
</footer>

<script>
  window.addEventListener('load', function() {
    setTimeout(function() { document.getElementById('loader').classList.add('loader-hidden'); }, 500); // サブページはロード画面を少し短めに
  });
</script>

</body>
</html>
