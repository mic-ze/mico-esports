<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta property="og:title" content="MICO e-Sports | 公式ウェブサイト" />
  <meta property="og:description" content="競技の最前線で勝ち、配信でファンを熱狂させる。MICO e-Sportsの公式サイトが遂にオープン！" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mic-ze.github.io/mico-esports/index.html" />
  <meta property="og:image" content="https://mic-ze.github.io/mico-esports/ogp.jpg" />
  <meta property="og:site_name" content="MICO e-Sports" />
  
  <meta name="twitter:card" content="summary_large_image" />
  <title>MICO e-Sports | 公式ウェブサイト</title>
  <style>
    :root {
      --bg-main: #0a0c10;
      --bg-card: #161b22;
      --text-main: #e6edf3;
      --text-muted: #8b949e;
      --accent-blue: #2f81f7;
      --accent-cyan: #00d4ff;
      --border-color: #30363d;
      --radius: 18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #0a0c10; color: var(--text-main); line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 32px, 1100px); margin: 0 auto; }

    /* ===== Loading Screen ===== */
    #loader {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #0a0c10; z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .loader-logo {
      font-size: 2rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { opacity: 0.6; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.6; transform: scale(0.98); } }
    .loader-hidden { opacity: 0; visibility: hidden; }

    /* ===== Header ===== */
    header {
      position: sticky; top: 0; z-index: 1000;
      backdrop-filter: blur(16px); background: rgba(10,12,16,0.85);
      border-bottom: 1px solid rgba(48,54,61,0.7);
    }
    .nav { display: flex; justify-content: space-between; align-items: center; min-height: 72px; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.2rem; letter-spacing: 0.5px; }
    .logo img { width: 38px; height: 38px; object-fit: contain; }
    .logo span { background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .nav-links a { font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; transition: all 0.3s ease; }
    .nav-links a:hover { color: #ffffff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }

    /* ===== Hero ===== */
    .hero {
      min-height: 75vh; display: flex; align-items: center;
      background-image: linear-gradient(rgba(10, 12, 16, 0.5), rgba(10, 12, 16, 0.95)), url('hero-bg.png');
      background-size: cover; background-position: center;
    }
    .hero-grid { display: flex; justify-content: center; width: 100%; }
    .hero-card { width: 100%; max-width: 800px; text-align: center; }
    h1 { font-size: 3.5rem; line-height: 1.1; margin: 16px 0; letter-spacing: 2px; }
    .muted { color: var(--text-muted); }
    .btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 30px; justify-content: center; }
    .btn { padding: 12px 28px; border-radius: 999px; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; border: 1px solid transparent; transition: all 0.2s ease; }
    .primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); color: #fff; }
    .primary:hover { opacity: 0.9; transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
    .secondary { border: 1px solid var(--border-color); background: rgba(22, 27, 34, 0.5); }
    .secondary:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--text-main); }

    /* ===== Sections ===== */
    section { padding: 80px 0; }
    .bg-darker { background-color: rgba(15, 18, 25, 0.5); }
    .section-header { text-align: center; margin-bottom: 50px; }
    .section-subtitle { color: var(--accent-blue); font-size: 0.9rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 4px; text-transform: uppercase; }
    .section-title { font-size: 2rem; font-weight: bold; letter-spacing: 1px; }

    /* ===== NEWS ===== */
    .news-list { list-style: none; max-width: 900px; margin: 0 auto; }
    .news-item { display: flex; gap: 20px; padding: 24px 0; border-bottom: 1px solid var(--border-color); transition: all 0.3s ease; align-items: center; }
    .news-item:hover { background: rgba(255, 255, 255, 0.02); padding-left: 15px; }
    .news-meta { display: flex; gap: 12px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; }
    .news-date { color: var(--text-muted); }
    .news-cat { color: var(--accent-cyan); }
    .news-title { color: var(--text-main); font-size: 0.95rem; line-height: 1.5; }

    footer { border-top: 1px solid var(--border-color); padding: 40px 0; margin-top: 40px; text-align: center; }

    @media (max-width: 800px) {
      .hero-grid { grid-template-columns: 1fr; }
      h1 { font-size: 2.2rem; }
      .nav-links { justify-content: center; gap: 12px; margin-top: 10px; }
      .news-item { flex-direction: column; gap: 8px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div id="loader"><div class="loader-logo">MICO e-Sports</div></div>

<header>
  <div class="container nav">
    <div class="logo">
      <a href="index.html" style="display:flex; align-items:center; gap:12px;">
        <img src="logo.png" alt="MICOロゴ">
        <span>MICO e-Sports</span>
      </a>
    </div>
    <nav class="nav-links">
      <a href="news.html">NEWS</a>
      <a href="about.html">ABOUT</a>
      <a href="divisions.html">DIVISIONS</a>
      <a href="members.html">MEMBERS</a>
      <a href="sponsor.html">SPONSOR</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-card">
        <h1>勝つ、その先へ。</h1>
        <p class="muted">
          競技の最前線で勝ち、配信でファンを熱狂させる。<br>
          強さとエンタメ性を武器に、常にその先を目指すe-Sportsチーム。
        </p>
        <div class="btns">
          <a class="btn primary" href="about.html">MORE</a>
          <a class="btn secondary" href="contact.html">CONTACT</a>
        </div>
      </div>
    </div>
  </section>

  <section id="news" class="bg-darker">
    <div class="container">
      <div class="section-header">
        <div class="section-subtitle">NEWS</div>
        <h2 class="section-title">最新情報</h2>
      </div>
      <ul class="news-list">
        <li>
          <a href="#" class="news-item">
            <div class="news-meta"><span class="news-cat">[TEAM]</span><span class="news-date">2026.07.01</span></div>
            <div class="news-title">MICO e-Sports 公式サイトをリニューアル公開しました。</div>
          </a>
        </li>
      </ul>
    </div>
  </section>
</main>

<footer>
  <div class="container">
    <div class="footer-nav" style="display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; margin-bottom: 24px;">
      <a href="contact.html" style="font-size: 0.85rem; font-weight: bold; letter-spacing: 1px;">CONTACT</a>
      <a href="privacy.html" style="font-size: 0.85rem; font-weight: bold; letter-spacing: 1px;">PRIVACY POLICY</a>
    </div>
    <p class="copyright" style="color: var(--text-muted); font-size: 0.8rem; letter-spacing: 1px;">&copy; 2026 MICO e-Sports. All rights reserved.</p>
  </div>
</footer>

<script>
  window.addEventListener('load', function() {
    setTimeout(function() { document.getElementById('loader').classList.add('loader-hidden'); }, 800); 
  });
</script>

</body>
</html>
